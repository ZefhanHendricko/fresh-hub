<!doctype html>
<html>
  <head>
    <title>Login - Fresh Hub</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        display: flex;
        justify-content: center;
        background: #111;
      }

      .main {
        width: 375px;
        background: #3fa046;
        min-height: 100vh;
        padding: 20px;
      }

      h2 {
        text-align: center;
      }

      input {
        width: 90%;

        padding: 12px;

        margin: 10px 0;

        border-radius: 10px;

        border: 1px solid #ccc;

        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #2fb463;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="main">
      <h2>Login Pengguna</h2>

      <input type="text" placeholder="Email or Username" />

      <input type="password" placeholder="Password" />

      <button onclick="login()">Login</button>
    </div>

    <script>
      function login() {
        alert("Login Berhasil!");

        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
